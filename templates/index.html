<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SCOUT | Visual Guide</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">AI<span>SCOUT</span></div>
            <p>Visual Intelligence for Explorers</p>
        </header>

        <div class="viewport-box">
            <video id="video" autoplay muted playsinline></video>
            <div class="hud">LENS ACTIVE</div>
        </div>

        <div class="actions">
            <button id="startCam" class="btn-sec">Start Lens</button>
            <button id="analyze" class="btn-pri" disabled>📸 Analyze Scene</button>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <button id="close" class="close-btn">&times;</button>
            <div id="loader" class="loader-wrap">
                <div class="spinner"></div>
                <p>Accessing Global Archives...</p>
            </div>
            <div id="output" style="display:none;">
                <div id="histFrame" class="historical-frame" style="display:none;">
                    <h4>HISTORICAL REFERENCE</h4>
                    <img id="histImg" src="" alt="History">
                </div>
                <div id="textRes" class="markdown-body"></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const startCam = document.getElementById('startCam');
        const analyze = document.getElementById('analyze');
        const modal = document.getElementById('modal');
        const textRes = document.getElementById('textRes');
        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        const histImg = document.getElementById('histImg');
        const histFrame = document.getElementById('histFrame');

        let stream;

        startCam.onclick = async () => {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;
                stream = null;
                startCam.innerText = "Start Lens";
                analyze.disabled = true;
            } else {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                startCam.innerText = "Stop Lens";
                analyze.disabled = false;
            }
        };

        analyze.onclick = async () => {
            modal.style.display = 'flex';
            loader.style.display = 'block';
            output.style.display = 'none';

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

            const res = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: dataUrl})
            });
            const data = await res.json();

            loader.style.display = 'none';
            output.style.display = 'block';
            textRes.innerHTML = marked.parse(data.insight);

            if (data.historical_image) {
                histImg.src = data.historical_image;
                histFrame.style.display = 'block';
            } else {
                histFrame.style.display = 'none';
            }
        };

        document.getElementById('close').onclick = () => modal.style.display = 'none';
    </script>
</body>
</html>
